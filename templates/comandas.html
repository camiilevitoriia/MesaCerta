{% extends "layout.html" %}

{% block titulo %}Comandas - Mesa Certa{% endblock %}

{% block conteudo %}
<main>
    <section class="formulario">
        <h2>Nova Comanda</h2>
        <form id="formComanda">
            <div class="form-group">
                <label for="cliente">Nome do Cliente *</label>
                <input type="text" id="cliente" placeholder="Digite o nome do cliente" required>
            </div>

            <div class="form-group">
                <label for="mesa">Número da Mesa *</label>
                <input type="number" id="mesa" min="1" placeholder="Ex.: 12" required>
            </div>

            <div class="form-group">
                <label for="pedido">Pedido *</label>
                <input type="text" id="pedido" placeholder="Ex.: Pizza Calabresa" required>
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade *</label>
                <input type="number" id="quantidade" min="1" placeholder="Quantidade" required>
            </div>

            <div class="form-group">
                <label for="valor">Valor Unitário (R$) *</label>
                <input type="number" id="valor" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <button id="btnCadastrar" type="submit">Cadastrar Comanda</button>
        </form>

        <div id="mensagem"></div>
    </section>

    <section>
        <h2 style="margin-bottom:20px; color: #8B0000;">Comandas Cadastradas</h2>
        <table id="tabelaComandas">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Mesa</th>
                    <th>Pedido</th>
                    <th>Quantidade</th>
                    <th>Valor Unitário</th>
                    <th>Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
            </tbody>
        </table>
    </section>
    
    <br>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('index') }}" class="botao">Voltar para a Página Inicial</a>
    </div>
</main>
{% endblock %}
